name: Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'blocks/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  build:
    name: Build
    timeout-minutes: 15
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.59.0-jammy

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Fix Git Ownership
        run: git config --global --add safe.directory '*'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Debug Browser Location
        run: |
          echo "Contents of /ms-playwright:"
          ls -la /ms-playwright/ || echo "Directory not found"
          echo "Searching for chrome executables:"
          find /ms-playwright -name "chrome*" -type f 2>/dev/null || echo "No chrome executables found"
          echo "PLAYWRIGHT_BROWSERS_PATH: $PLAYWRIGHT_BROWSERS_PATH"

      - name: Format
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
