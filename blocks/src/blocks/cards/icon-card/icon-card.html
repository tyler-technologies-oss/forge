<!--
  @block Icon Card
  @description Action card featuring an icon, title, and description for quick navigation or feature highlights
  @tags card, icon, navigation, action
-->
<div class="p-large">
  <forge-card class="icon-card" style="max-width: 320px">
    <div class="flex items-center gap-medium">
      <forge-avatar
        class="[--forge-avatar-background:var(--forge-theme-primary-container-low)] [--forge-avatar-color:var(--forge-theme-on-primary-container-low)] [--forge-avatar-shape:var(--forge-shape-medium)]"
        size="large">
        <forge-icon name="note_add"></forge-icon>
      </forge-avatar>
      <div class="flex flex-col gap-xxxsmall">
        <span class="text-heading1">Create a Project</span>
        <span class="text-body1 text-on-surface-secondary">The first step in building agents</span>
      </div>
    </div>
  </forge-card>
</div>
