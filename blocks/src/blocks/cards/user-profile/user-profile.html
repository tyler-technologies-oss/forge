<!--
  @block User Profile Card
  @description Card displaying user profile information with avatar icon, name, email address, and phone number
  @tags card, profile, user, avatar, contact
-->
<div class="min-h-screen flex items-center justify-center" style="padding: var(--forge-spacing-large);">
  <forge-card class="w-full max-w-sm">
    <div class="flex flex-col items-center text-center" style="gap: var(--forge-spacing-medium);">
      <forge-avatar text="Jane Doe" style="--forge-avatar-size: 72px;"></forge-avatar>
      <div class="flex flex-col" style="gap: var(--forge-spacing-xxsmall);">
        <h2 class="forge-typography--subheading3">Jane Doe</h2>
        <p class="forge-typography--body2" style="color: var(--forge-theme-text-medium);">Software Engineer</p>
      </div>
      <div class="flex flex-col w-full" style="gap: var(--forge-spacing-small);">
        <div class="flex items-center justify-center" style="gap: var(--forge-spacing-small);">
          <forge-icon name="email" style="color: var(--forge-theme-text-medium);"></forge-icon>
          <span class="forge-typography--body2">jane.doe@example.com</span>
        </div>
        <div class="flex items-center justify-center" style="gap: var(--forge-spacing-small);">
          <forge-icon name="phone" style="color: var(--forge-theme-text-medium);"></forge-icon>
          <span class="forge-typography--body2">(555) 123-4567</span>
        </div>
      </div>
    </div>
  </forge-card>
</div>
