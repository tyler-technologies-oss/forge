<!--
  @block Mini Nav Application Layout
  @description Application shell with a collapsible mini navigation drawer that expands on hover, an app bar with notification icons and a user profile dropdown with theme toggle
  @tags layout, application, shell, mini-drawer, app-bar, user-profile, hover
-->

<forge-app-layout app-title="Support Center" app-title-href="/" use-mini-drawer mini-hover>
  <!-- App bar logo -->
  <forge-icon slot="app-bar-logo" name="support"></forge-icon>

  <!-- App bar end actions -->
  <div slot="app-bar-end" class="flex items-center gap-xsmall">
    <forge-icon-button density="medium" aria-label="Notifications" theme="app-bar">
      <forge-icon name="notifications"></forge-icon>
    </forge-icon-button>
    <forge-icon-button density="medium" aria-label="Help" theme="app-bar">
      <forge-icon name="help"></forge-icon>
    </forge-icon-button>

    <forge-user-profile email="john.doe@example.com" button-label="Open profile menu" theme-toggle full-name="John Doe" slot="app-bar-end">
      <forge-profile-link slot="link">
        <forge-icon slot="icon" name="settings"></forge-icon>
        <a href="#">Settings</a>
      </forge-profile-link>
      <forge-profile-link slot="link">
        <forge-icon slot="icon" name="account_circle"></forge-icon>
        <a href="#">Profile</a>
      </forge-profile-link>
      <span slot="sign-out-button-text">Sign Out</span>
    </forge-user-profile>
  </div>

  <!-- Navigation drawer content (mini drawer) -->
  <forge-list slot="navigation" navlist>
    <forge-list-item>
      <forge-icon slot="start" name="inbox"></forge-icon>
      <a href="#">Inbox</a>
    </forge-list-item>
    <forge-list-item selected>
      <forge-icon slot="start" name="add_circle"></forge-icon>
      <a href="#">New Request</a>
    </forge-list-item>
    <forge-list-item>
      <forge-icon slot="start" name="send"></forge-icon>
      <a href="#">Sent</a>
    </forge-list-item>
    <forge-list-item>
      <forge-icon slot="start" name="drafts"></forge-icon>
      <a href="#">Drafts</a>
    </forge-list-item>
    <forge-list-item>
      <forge-icon slot="start" name="history"></forge-icon>
      <a href="#">History</a>
    </forge-list-item>
    <forge-divider></forge-divider>
    <forge-list-item>
      <forge-icon slot="start" name="star"></forge-icon>
      <a href="#">Starred</a>
    </forge-list-item>
    <forge-list-item>
      <forge-icon slot="start" name="settings"></forge-icon>
      <a href="#">Settings</a>
    </forge-list-item>
  </forge-list>

  <!-- Main content -->
  <main class="p-medium h-full bg-surface-dim" slot="body">
    <div class="striped-box h-full"></div>
  </main>

  <!-- Footer -->
  <footer slot="body-footer">
    <forge-toolbar inverted>
      <div slot="center" class="text-body2">© 2026 Support Center. Need help? Contact us at support@example.com</div>
    </forge-toolbar>
  </footer>
</forge-app-layout>
