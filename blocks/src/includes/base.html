<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="{{baseHref}}" />
    <title>{{title}}</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <link rel="stylesheet" href="{{baseHref}}theme.css" />
    <link rel="stylesheet" href="{{baseHref}}styles.css" />
    <style>
      body {
        opacity: 0;
        transition: opacity 0.2s ease-in;
      }
      body.ready {
        opacity: 1;
      }
    </style>
    <script type="module" src="{{baseHref}}forge-register.js"></script>
  </head>
  <body class="{{bodyClass}}" style="background-color: transparent">
    {{{body}}}
    <!-- On the forge docs site, these two script tags get removed from the code snippet, but they are still present in this actual page. They are used to handle the ready transition and theme listener for the site. -->
    <script type="module" src="{{baseHref}}ready-transition.js" id="ready-transition"></script>
    <script type="module" src="{{baseHref}}theme-listener.js" id="theme-listener"></script>
  </body>
</html>
