<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forge-date-time-picker playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet" />
  </head>
  <body>
    <header>
      <h1>forge-date-time-picker</h1>
      <p>
        Standalone Vite + Lit playground. Real implementation lives at
        <code>packages/forge/src/lib/date-time-picker/</code> in
        <a href="https://github.com/dannydel/forge/tree/feat/date-time-picker">dannydel/forge#feat/date-time-picker</a>.
      </p>
    </header>

    <main>
      <aside class="controls">
        <h2>Options</h2>

        <label>Variant
          <select id="opt-variant">
            <option value="static">Static (inline card)</option>
            <option value="inline">Inline (input + popover)</option>
          </select>
        </label>

        <label>Time mode
          <select id="opt-time-mode">
            <option value="slots">Slots (booking style)</option>
            <option value="range">Range (start – end)</option>
            <option value="single">Single</option>
          </select>
        </label>

        <label>Orientation
          <select id="opt-orientation">
            <option value="auto">Auto</option>
            <option value="horizontal">Horizontal</option>
            <option value="vertical">Vertical</option>
          </select>
        </label>

        <label>Locale
          <select id="opt-locale">
            <option value="en-US">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
            <option value="es-ES">Spanish</option>
            <option value="ja-JP">Japanese</option>
          </select>
        </label>

        <label>Step (minutes)
          <select id="opt-step">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15" selected>15</option>
            <option value="30">30</option>
            <option value="60">60</option>
          </select>
        </label>

        <label class="check"><input type="checkbox" id="opt-24h" /> 24-hour time</label>
        <label class="check"><input type="checkbox" id="opt-seconds" /> Allow seconds</label>
        <label class="check"><input type="checkbox" id="opt-summary" /> Summary panel</label>
        <label class="check"><input type="checkbox" id="opt-header" /> Show header slot</label>
        <label class="check"><input type="checkbox" id="opt-footer" /> Show footer</label>
        <label class="check"><input type="checkbox" id="opt-time-label" /> Show time label</label>
        <label class="check"><input type="checkbox" id="opt-required" /> Required</label>
        <label class="check"><input type="checkbox" id="opt-disabled" /> Disabled</label>
        <label class="check"><input type="checkbox" id="opt-clear-button" /> Clear button</label>
        <label class="check"><input type="checkbox" id="opt-today-button" /> Today button</label>
      </aside>

      <section class="stage">
        <forge-date-time-picker id="demo" time-mode="slots">
          <span slot="header" id="demo-header" hidden>
            <strong style="font-size: 1.1rem;">Pick a meeting time</strong>
          </span>
          <span slot="time-label" id="demo-time-label" hidden>Available times</span>
          <span slot="footer-start" id="demo-footer-start" hidden>
            <span id="demo-footer-summary"></span>
          </span>
          <span slot="footer-end" id="demo-footer-end" hidden>
            <forge-button variant="raised" id="demo-continue">Continue</forge-button>
          </span>
        </forge-date-time-picker>

        <dl class="readout">
          <dt>Last change source</dt>
          <dd id="demo-source">—</dd>
          <dt>Complete</dt>
          <dd id="demo-complete">false</dd>
          <dt>Value (JSON)</dt>
          <dd><pre id="demo-value">null</pre></dd>
        </dl>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
