<!--
  @block Table with Icon Actions
  @description Data table inside a card with a toolbar header featuring icon buttons for filtering, exporting, and additional options
  @tags table, data, card, toolbar, icons, actions
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/blocks/pr-1145/" />
    <title>Table with Icon Actions</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <link rel="stylesheet" href="/blocks/pr-1145/theme.css" />
    <link rel="stylesheet" href="/blocks/pr-1145/styles.css" />
    <style>
      body {
        opacity: 0;
        transition: opacity 0.2s ease-in;
      }
      body.ready {
        opacity: 1;
      }
    </style>
    <script type="module" src="/blocks/pr-1145/forge-register.js"></script>
    <script type="module" src="/blocks/pr-1145/ready-transition.js" id="ready-transition"></script>
    <script type="module" src="/blocks/pr-1145/theme-listener.js" id="theme-listener"></script>
  </head>
  <body class="" style="background-color: transparent">
    <div class="p-medium">
  <forge-card no-padding>
    <forge-toolbar>
      <h2 slot="start" class="text-heading3">Project Tasks</h2>
      <div slot="end" class="flex gap-xsmall">
        <forge-icon-button density="medium" aria-label="Filter">
          <forge-icon name="filter_list"></forge-icon>
        </forge-icon-button>
        <forge-icon-button density="medium" aria-label="Export">
          <forge-icon name="download"></forge-icon>
        </forge-icon-button>
        <forge-icon-button density="medium" aria-label="More options">
          <forge-icon name="more_vert"></forge-icon>
        </forge-icon-button>
      </div>
    </forge-toolbar>
    <forge-table id="tasks-table"></forge-table>
  </forge-card>
</div>

<script type="module" src="/src/blocks/tables/table-with-icon-actions/table-with-icon-actions.ts"></script>
  </body>
</html>
