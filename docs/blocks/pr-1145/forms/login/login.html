<!--
  @block Login Form
  @description Centered authentication form card displayed over a gradient background, featuring credential input fields with labels, a remember-me checkbox, a forgot password link, a primary submit button, a visual divider, and a secondary registration link
  @tags authentication, login, form, card, centered, scaffold, toolbar
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/blocks/pr-1145/" />
    <title>Login Form</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <link rel="stylesheet" href="/blocks/pr-1145/theme.css" />
    <link rel="stylesheet" href="/blocks/pr-1145/styles.css" />
    <style>
      body {
        opacity: 0;
        transition: opacity 0.2s ease-in;
      }
      body.ready {
        opacity: 1;
      }
    </style>
    <script type="module" src="/blocks/pr-1145/forge-register.js"></script>
  </head>
  <body class="gradient-bg p-8 min-h-screen flex items-center justify-center" style="background-color: transparent">
    <forge-card class="max-w-md w-full" no-padding>
    <forge-scaffold>
      <forge-toolbar slot="header">
        <h2 slot="start" class="text-heading3">Sign In</h2>
      </forge-toolbar>

      <div slot="body" class="p-medium">
        <p class="text-body2 text-medium mb-6">Enter your credentials to access your account</p>

        <form id="login-form" class="flex flex-col gap-medium">
          <forge-text-field label-position="block-start">
            <label for="email">Email</label>
            <input type="email" id="email" autocomplete="email" />
          </forge-text-field>

          <forge-text-field label-position="block-start">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" />
          </forge-text-field>

          <div class="flex items-center justify-between">
            <forge-checkbox>Remember me</forge-checkbox>
            <a href="#" class="forge-hyperlink text-body2">Forgot password?</a>
          </div>
        </form>

        <forge-divider class="my-6"></forge-divider>

        <p class="text-body2 text-medium text-center">Don't have an account? <a href="#" class="forge-hyperlink">Sign up</a></p>
      </div>

      <forge-toolbar slot="footer" inverted>
        <div slot="end" class="flex items-center gap-small">
          <forge-button variant="raised" type="submit" form="login-form">Sign In</forge-button>
        </div>
      </forge-toolbar>
    </forge-scaffold>
  </forge-card>
    <!-- On the forge docs site, these two script tags get removed from the code snippet, but they are still present in this actual page. They are used to handle the ready transition and theme listener for the site. -->
    <script type="module" src="/blocks/pr-1145/ready-transition.js" id="ready-transition"></script>
    <script type="module" src="/blocks/pr-1145/theme-listener.js" id="theme-listener"></script>
  </body>
</html>
