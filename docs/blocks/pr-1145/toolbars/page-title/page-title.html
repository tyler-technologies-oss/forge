<!--
  @block Page Title
  @description Toolbar with page title heading and action icon buttons for notifications, settings, and more options
  @tags toolbar, page-title, heading, actions, icon-buttons
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/blocks/pr-1145/" />
    <title>Page Title</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <link rel="stylesheet" href="/blocks/pr-1145/theme.css" />
    <link rel="stylesheet" href="/blocks/pr-1145/styles.css" />
    <style>
      body {
        opacity: 0;
        transition: opacity 0.2s ease-in;
      }
      body.ready {
        opacity: 1;
      }
    </style>
    <script type="module" src="/blocks/pr-1145/forge-register.js"></script>
  </head>
  <body class="">
    <div class="p-medium">
  <forge-toolbar>
    <h2 slot="start" class="text-heading3">Page title</h2>
    <div slot="end" class="flex gap-xsmall">
      <forge-icon-button density="medium" aria-label="Notifications">
        <forge-icon name="notifications"></forge-icon>
      </forge-icon-button>
      <forge-icon-button density="medium" aria-label="Settings">
        <forge-icon name="settings"></forge-icon>
      </forge-icon-button>
      <forge-icon-button density="medium" aria-label="More options">
        <forge-icon name="more_vert"></forge-icon>
      </forge-icon-button>
    </div>
  </forge-toolbar>
</div>
    <script type="module" src="/blocks/pr-1145/ready-transition.js"></script>
    <script type="module" src="/blocks/pr-1145/theme-listener.js"></script>
  </body>
</html>
