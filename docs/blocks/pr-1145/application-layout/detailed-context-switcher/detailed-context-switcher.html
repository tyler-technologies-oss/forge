<!--
  @block Detailed Context Switcher
  @description Application layout with a detailed context switcher in the navigation drawer. The selected context (organization, property, account, workspace, etc.) determines the scope of all data displayed throughout the app. Features a prominent current context display with name, address, quick actions, and a dropdown to switch contexts.
  @tags layout, application, context-switcher, detailed, scope, workspace, tenant, multi-tenant, organization, navigation, drawer, select, global-context
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/blocks/pr-1145/" />
    <title>Detailed Context Switcher</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <link rel="stylesheet" href="/blocks/pr-1145/theme.css" />
    <link rel="stylesheet" href="/blocks/pr-1145/styles.css" />
    <style>
      body {
        opacity: 0;
        transition: opacity 0.2s ease-in;
      }
      body.ready {
        opacity: 1;
      }
    </style>
    <script type="module" src="/blocks/pr-1145/forge-register.js"></script>
    <script type="module" src="/blocks/pr-1145/ready-transition.js" id="ready-transition"></script>
    <script type="module" src="/blocks/pr-1145/theme-listener.js" id="theme-listener"></script>
  </head>
  <body class="" style="background-color: transparent">
    <forge-app-layout app-title="Facility Manager" app-title-href="/">
    <!-- App bar logo -->
    <forge-icon slot="app-bar-logo" name="home_city"></forge-icon>

    <!-- App bar end actions -->
    <div slot="app-bar-end" class="flex items-center gap-xsmall">
      <forge-icon-button density="medium" aria-label="Notifications" theme="app-bar">
        <forge-icon name="notifications"></forge-icon>
      </forge-icon-button>
      <forge-avatar text="Maria Santos" style="--forge-avatar-size: 40px"></forge-avatar>
    </div>

    <!-- Navigation drawer content -->
    <div slot="navigation" class="flex flex-col h-full">
      <!-- Context switcher section -->
      <forge-card class="p-small tonal-card">
        <div class="flex items-start gap-medium mb-small">
          <forge-avatar
            style="
              --forge-avatar-size: 32px;
              --forge-avatar-background: var(--forge-theme-primary-container);
              --forge-avatar-color: var(--forge-theme-on-primary-container);
            ">
            <forge-icon name="location_city"></forge-icon>
          </forge-avatar>
          <div class="flex-1 min-w-0">
            <p class="text-heading2 truncate mb-0">Main Library</p>
            <p class="text-body2 text-medium truncate mb-0">425 Oak St</p>
          </div>
        </div>

        <forge-select label="Switch facility" label-position="block-start" value="main-library" style="width: 100%">
          <forge-option value="main-library">Main Library - 425 Oak St</forge-option>
          <forge-option value="north-branch">North Branch - 1200 Pine Ave</forge-option>
          <forge-option value="south-branch">South Branch - 890 Elm Dr</forge-option>
          <forge-option value="downtown">Downtown Center - 50 Main St</forge-option>
        </forge-select>

        <div class="flex gap-xsmall mt-small">
          <forge-icon-button id="directions-btn" aria-label="Get directions" density="medium" class="text-medium">
            <forge-tooltip anchor="directions-btn" placement="bottom">Get directions</forge-tooltip>
            <forge-icon name="directions"></forge-icon>
          </forge-icon-button>

          <forge-icon-button id="call-btn" aria-label="Call facility" density="medium" class="text-medium">
            <forge-tooltip anchor="call-btn" placement="bottom">Call</forge-tooltip>
            <forge-icon name="phone"></forge-icon>
          </forge-icon-button>

          <forge-icon-button id="info-btn" aria-label="Facility details" density="medium" class="text-medium">
            <forge-tooltip anchor="info-btn" placement="bottom">Details</forge-tooltip>
            <forge-icon name="info"></forge-icon>
          </forge-icon-button>
        </div>
      </forge-card>

      <forge-divider></forge-divider>

      <!-- Navigation list -->
      <nav class="p-medium space-y-medium">
        <div class="striped-box"></div>
        <div class="striped-box"></div>
        <div class="striped-box"></div>
        <div class="striped-box"></div>
        <div class="striped-box"></div>
        <div class="striped-box"></div>
      </nav>
    </div>

    <!-- Body header toolbar -->
    <div slot="body-header">
      <forge-toolbar>
        <h2 slot="start" class="text-heading3">Page title</h2>
      </forge-toolbar>
    </div>

    <!-- Main content -->
    <main class="p-medium bg-surface-dim" slot="body">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-medium">
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
      </div>
    </main>
  </forge-app-layout>
  </body>
</html>
