<!--
  @block Compact Context Switcher
  @description Application layout with a compact context switcher in the navigation drawer. The selected context (organization, property, account, workspace, etc.) determines the scope of all data displayed throughout the app. Features a minimal select dropdown for quick context switching.
  @tags layout, application, context-switcher, compact, minimal, scope, workspace, tenant, multi-tenant, organization, navigation, drawer, select, global-context
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/blocks/pr-1145/" />
    <title>Compact Context Switcher</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <link rel="stylesheet" href="/blocks/pr-1145/theme.css" />
    <link rel="stylesheet" href="/blocks/pr-1145/styles.css" />
    <style>
      body {
        opacity: 0;
        transition: opacity 0.2s ease-in;
      }
      body.ready {
        opacity: 1;
      }
    </style>
    <script type="module" src="/blocks/pr-1145/forge-register.js"></script>
  </head>
  <body class="">
    <forge-app-layout app-title="Facility Manager" app-title-href="/">
    <!-- App bar logo -->
    <forge-icon slot="app-bar-logo" name="home_city"></forge-icon>

    <!-- App bar end actions -->
    <div slot="app-bar-end" class="flex items-center gap-xsmall">
      <forge-icon-button density="medium" aria-label="Notifications" theme="app-bar">
        <forge-icon name="notifications"></forge-icon>
      </forge-icon-button>
      <forge-avatar text="Maria Santos" style="--forge-avatar-size: 40px"></forge-avatar>
    </div>

    <!-- Navigation drawer content -->
    <div slot="navigation" class="flex flex-col h-full">
      <!-- Compact context switcher section -->
      <div class="p-medium">
        <forge-select label="Facility" label-position="block-start" value="main-library" style="width: 100%">
          <forge-option value="main-library">Main Library - 425 Oak St</forge-option>
          <forge-option value="north-branch">North Branch - 1200 Pine Ave</forge-option>
          <forge-option value="south-branch">South Branch - 890 Elm Dr</forge-option>
          <forge-option value="downtown">Downtown Center - 50 Main St</forge-option>
        </forge-select>
      </div>

      <forge-divider></forge-divider>

      <!-- Navigation list -->
      <nav class="p-medium space-y-medium">
        <div class="striped-box"></div>
        <div class="striped-box"></div>
        <div class="striped-box"></div>
        <div class="striped-box"></div>
        <div class="striped-box"></div>
        <div class="striped-box"></div>
      </nav>
    </div>

    <!-- Body header toolbar -->
    <div slot="body-header">
      <forge-toolbar>
        <h2 slot="start" class="text-heading3">Page title</h2>
      </forge-toolbar>
    </div>

    <!-- Main content -->
    <main class="p-medium" slot="body">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-medium">
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
        <div class="striped-box h-[200px]"></div>
      </div>
    </main>
  </forge-app-layout>
    <script type="module" src="/blocks/pr-1145/ready-transition.js" id="ready-transition"></script>
    <script type="module" src="/blocks/pr-1145/theme-listener.js" id="theme-listener"></script>
  </body>
</html>
