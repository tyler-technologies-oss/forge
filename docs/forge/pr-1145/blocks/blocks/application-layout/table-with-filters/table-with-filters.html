<!--
  @block Table with Filter Sidesheet
  @description Full application layout with header, left navigation drawer, paginated data table in the body, and a filter sidesheet in the right drawer. Demonstrates a common pattern for data-heavy applications with filtering capabilities.
  @tags layout, application, table, filter, sidesheet, drawer, navigation, paginator, data
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table with Filter Sidesheet</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <style>
      body {
        opacity: 0;
        transition: opacity 0.2s ease-in;
      }
      body.ready {
        opacity: 1;
      }
    </style>
    <script type="module" crossorigin src="../../../../assets/blocks/application-layout/table-with-filters/table-with-filters-BMirbXle.js"></script>
    <link rel="modulepreload" crossorigin href="../../../../assets/forge-register-EL4SVgZm.js">
    <link rel="modulepreload" crossorigin href="../../../../assets/ready-transition-CtUJQYD5.js">
    <link rel="stylesheet" crossorigin href="../../../../assets/forge-register-BLkCfebn.css">
  </head>
  <body class="">
    <forge-app-layout app-title="Orders Management" app-title-href="/">
  <!-- App bar logo -->
  <forge-icon slot="app-bar-logo" name="inventory_2"></forge-icon>

  <!-- App bar end actions -->
  <div slot="app-bar-end" class="flex items-center gap-xsmall">
    <forge-icon-button density="medium" aria-label="Notifications" theme="app-bar">
      <forge-icon name="notifications"></forge-icon>
    </forge-icon-button>
    <forge-icon-button density="medium" aria-label="Account" theme="app-bar">
      <forge-icon name="account_circle"></forge-icon>
    </forge-icon-button>
  </div>

  <!-- Left navigation drawer -->
  <forge-list slot="navigation" navlist>
    <forge-list-item selected>
      <forge-icon slot="start" name="dashboard"></forge-icon>
      <a href="#">Dashboard</a>
    </forge-list-item>
    <forge-list-item>
      <forge-icon slot="start" name="bar_chart"></forge-icon>
      <a href="#">Analytics</a>
    </forge-list-item>
    <forge-list-item>
      <forge-icon slot="start" name="people"></forge-icon>
      <a href="#">Users</a>
    </forge-list-item>
    <forge-list-item>
      <forge-icon slot="start" name="folder"></forge-icon>
      <a href="#">Projects</a>
    </forge-list-item>
    <forge-divider></forge-divider>
    <forge-list-item>
      <forge-icon slot="start" name="settings"></forge-icon>
      <a href="#">Settings</a>
    </forge-list-item>
    <forge-list-item>
      <forge-icon slot="start" name="help"></forge-icon>
      <a href="#">Help</a>
    </forge-list-item>
  </forge-list>

  <!-- Body header toolbar -->
  <div slot="body-header">
    <forge-toolbar>
      <h2 slot="start" class="text-heading3">Orders</h2>
      <div slot="end" class="flex items-center gap-small">
        <forge-button variant="filled">
          <forge-icon slot="start" name="add"></forge-icon>
          New Order
        </forge-button>
      </div>
    </forge-toolbar>
  </div>

  <!-- Main body content with table -->
  <main slot="body" class="p-medium">
    <forge-structured-card heading-level="2" body-spacing="none">
      <div slot="title">All Orders</div>
      <forge-icon-button aria-label="Filter" slot="after-header-actions">
        <forge-icon name="filter_list"></forge-icon>
      </forge-icon-button>
      <forge-icon-button aria-label="Export" slot="after-header-actions">
        <forge-icon name="download"></forge-icon>
      </forge-icon-button>
      <forge-icon-button aria-label="More options" slot="after-header-actions">
        <forge-icon name="more_vert"></forge-icon>
      </forge-icon-button>

      <forge-table slot="body" id="orders-table"></forge-table>

      <forge-paginator slot="footer-primary-action" id="orders-paginator" page-size="5" total="12" page-index="0" first-last> </forge-paginator>
    </forge-structured-card>
  </main>

  <!-- Right drawer with filter sidesheet -->
  <div slot="body-right">
    <forge-drawer direction="right">
      <forge-scaffold>
        <forge-toolbar slot="header">
          <h2 slot="start" class="text-heading3">Filters</h2>
        </forge-toolbar>

        <div slot="body" class="p-medium flex flex-col gap-medium">
          <!-- Status filter (multi-select) -->
          <!-- Checkbox facet for multi-select filtering -->
          <div class="flex flex-col gap-xsmall">
            <span class="text-label1 text-medium">Status</span>
            <forge-list dense>
              <forge-list-item>
                <forge-checkbox slot="start" dense></forge-checkbox>
                Active
              </forge-list-item>
              <forge-list-item>
                <forge-checkbox slot="start" dense></forge-checkbox>
                Pending
              </forge-list-item>
              <forge-list-item>
                <forge-checkbox slot="start" dense></forge-checkbox>
                Completed
              </forge-list-item>
              <forge-list-item>
                <forge-checkbox slot="start" dense></forge-checkbox>
                Archived
              </forge-list-item>
            </forge-list>
          </div>

          <forge-divider></forge-divider>

          <!-- Date range filter (single-select) -->
          <!-- Radio facet for single-select filtering -->
          <div class="flex flex-col gap-xsmall">
            <span class="text-label1 text-medium">Date Range</span>
            <forge-radio-group>
              <forge-list dense>
                <forge-list-item>
                  <forge-radio slot="start" dense name="date-range" value="today"></forge-radio>
                  Today
                </forge-list-item>
                <forge-list-item>
                  <forge-radio slot="start" dense name="date-range" value="week"></forge-radio>
                  Last 7 days
                </forge-list-item>
                <forge-list-item>
                  <forge-radio slot="start" dense name="date-range" value="month"></forge-radio>
                  Last 30 days
                </forge-list-item>
                <forge-list-item>
                  <forge-radio slot="start" dense name="date-range" value="year"></forge-radio>
                  Last year
                </forge-list-item>
                <forge-list-item>
                  <forge-radio slot="start" dense name="date-range" value="all"></forge-radio>
                  All time
                </forge-list-item>
              </forge-list>
            </forge-radio-group>
          </div>
        </div>

        <forge-toolbar slot="footer" inverted>
          <div slot="end" class="flex gap-small w-full">
            <forge-button type="button" class="flex-1">Clear All</forge-button>
            <forge-button variant="filled" type="button" class="flex-1">Apply</forge-button>
          </div>
        </forge-toolbar>
      </forge-scaffold>
    </forge-drawer>
  </div>

  <!-- Footer -->
  <footer slot="body-footer">
    <forge-toolbar inverted>
      <div slot="center" class="text-body2">© 2026 Orders Management System</div>
    </forge-toolbar>
  </footer>
</forge-app-layout>

  </body>
</html>
