<!--
  @block Login Form
  @description Centered authentication form card displayed over a gradient background, featuring credential input fields with labels, a remember-me checkbox, a forgot password link, a primary submit button, a visual divider, and a secondary registration link
  @tags authentication, login, form, card, centered
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <style>
      body {
        opacity: 0;
        transition: opacity 0.2s ease-in;
      }
      body.ready {
        opacity: 1;
      }
    </style>
    <script type="module" crossorigin src="../../../assets/forge-register-Djvh_f8c.js"></script>
    <script type="module" crossorigin src="../../../assets/ready-transition-CtUJQYD5.js"></script>
    <link rel="stylesheet" crossorigin href="../../../assets/forge-register-BLkCfebn.css">
  </head>
  <body class="gradient-bg p-8 min-h-screen flex items-center justify-center">
    <forge-card class="max-w-md w-full p-0">
    <div class="p-medium">
      <h1 class="text-heading4 mb-2">Sign In</h1>
      <p class="text-body2 text-medium mb-6">Enter your credentials to access your account</p>

      <form class="flex flex-col gap-medium">
        <forge-text-field label-position="block-start">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" />
        </forge-text-field>

        <forge-text-field label-position="block-start">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" />
        </forge-text-field>

        <div class="flex items-center justify-between">
          <forge-checkbox>Remember me</forge-checkbox>
          <a href="#" class="forge-hyperlink text-body2">Forgot password?</a>
        </div>

        <forge-button variant="filled" type="submit" class="mt-2">Sign In</forge-button>
      </form>

      <forge-divider class="my-6"></forge-divider>

      <p class="text-body2 text-medium text-center">Don't have an account? <a href="#" class="forge-hyperlink">Sign up</a></p>
    </div>
  </forge-card>
  </body>
</html>
