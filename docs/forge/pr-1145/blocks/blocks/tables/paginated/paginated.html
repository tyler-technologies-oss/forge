<!--
  @block Paginated Table
  @description Data table with client-side pagination inside a structured card, featuring header action buttons for filtering, exporting, and additional options, along with a paginator control for navigating through large datasets by page
  @tags table, data, paginator, pagination, structured-card, actions
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paginated Table</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <style>
      body {
        opacity: 0;
        transition: opacity 0.2s ease-in;
      }
      body.ready {
        opacity: 1;
      }
    </style>
    <script type="module" crossorigin src="../../../../assets/blocks/tables/paginated/paginated-BMirbXle.js"></script>
    <link rel="modulepreload" crossorigin href="../../../../assets/forge-register-EL4SVgZm.js">
    <link rel="modulepreload" crossorigin href="../../../../assets/ready-transition-CtUJQYD5.js">
    <link rel="stylesheet" crossorigin href="../../../../assets/forge-register-BLkCfebn.css">
  </head>
  <body class="">
    <div class="p-medium">
  <forge-structured-card heading-level="2" body-spacing="none">
    <div slot="title">Forge Orders</div>
    <forge-icon-button aria-label="Filter" slot="after-header-actions">
      <forge-icon name="filter_list"></forge-icon>
    </forge-icon-button>
    <forge-icon-button aria-label="Export" slot="after-header-actions">
      <forge-icon name="download"></forge-icon>
    </forge-icon-button>
    <forge-icon-button aria-label="More options" slot="after-header-actions">
      <forge-icon name="more_vert"></forge-icon>
    </forge-icon-button>

    <forge-table slot="body" id="orders-table"></forge-table>

    <forge-paginator
      slot="footer-primary-action"
      id="orders-paginator"
      page-size="5"
      total="12"
      page-index="0"
      first-last>
    </forge-paginator>
  </forge-structured-card>
</div>

  </body>
</html>
