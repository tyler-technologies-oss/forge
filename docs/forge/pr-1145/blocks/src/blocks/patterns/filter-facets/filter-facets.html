<!--
  @block Filter Facets
  @description Filter facets rendered inside a drawer with scaffold layout, demonstrating checkboxes for multi-select and radio buttons for single-select filtering. Uses partials for reusable facet patterns. Use as a reference for building filter sidesheets, filter panels within cards, data table filters, and other page filtering UI.
  @tags filter, facets, checkbox, radio, sidebar, sidesheet, drawer, scaffold, search, refinement, list, partials, data-table
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filter Facets</title>
    <link rel="stylesheet" href="https://cdn.forge.tylertech.com/v1/css/tyler-font.css" />
    <style>
      body {
        opacity: 0;
        transition: opacity 0.2s ease-in;
      }
      body.ready {
        opacity: 1;
      }
    </style>
    <script type="module" crossorigin src="../../../../assets/forge-register-DCJSU-Af.js"></script>
    <script type="module" crossorigin src="../../../../assets/ready-transition-CtUJQYD5.js"></script>
    <link rel="stylesheet" crossorigin href="../../../../assets/forge-register-BLkCfebn.css">
  </head>
  <body class="">
    <forge-drawer direction="right">
  <forge-scaffold>
    <forge-toolbar slot="header">
      <h2 slot="start" class="text-heading3">Filters</h2>
    </forge-toolbar>

    <div slot="body" class="p-medium flex flex-col gap-medium">
      <!-- Checkbox facet partial (multi-select) -->
      <!-- Checkbox facet for multi-select filtering -->
      <div class="flex flex-col gap-xsmall">
        <span class="text-label1 text-medium">Status</span>
        <forge-list dense>
          <forge-list-item>
            <forge-checkbox slot="start" dense></forge-checkbox>
            Active
          </forge-list-item>
          <forge-list-item>
            <forge-checkbox slot="start" dense></forge-checkbox>
            Pending
          </forge-list-item>
          <forge-list-item>
            <forge-checkbox slot="start" dense></forge-checkbox>
            Completed
          </forge-list-item>
          <forge-list-item>
            <forge-checkbox slot="start" dense></forge-checkbox>
            Archived
          </forge-list-item>
        </forge-list>
      </div>

      <forge-divider></forge-divider>

      <!-- Radio facet partial (single-select) -->
      <!-- Radio facet for single-select filtering -->
      <div class="flex flex-col gap-xsmall">
        <span class="text-label1 text-medium">Date Range</span>
        <forge-radio-group>
          <forge-list dense>
            <forge-list-item>
              <forge-radio slot="start" dense name="date-range" value="today"></forge-radio>
              Today
            </forge-list-item>
            <forge-list-item>
              <forge-radio slot="start" dense name="date-range" value="week"></forge-radio>
              Last 7 days
            </forge-list-item>
            <forge-list-item>
              <forge-radio slot="start" dense name="date-range" value="month"></forge-radio>
              Last 30 days
            </forge-list-item>
            <forge-list-item>
              <forge-radio slot="start" dense name="date-range" value="year"></forge-radio>
              Last year
            </forge-list-item>
            <forge-list-item>
              <forge-radio slot="start" dense name="date-range" value="all"></forge-radio>
              All time
            </forge-list-item>
          </forge-list>
        </forge-radio-group>
      </div>

      <forge-divider></forge-divider>

      <!-- Additional checkbox facet example inline -->
      <div class="flex flex-col gap-xsmall">
        <span class="text-label1 text-medium">Price Range</span>
        <forge-list dense>
          <forge-list-item>
            <forge-checkbox slot="start" dense></forge-checkbox>
            Under $25
          </forge-list-item>
          <forge-list-item>
            <forge-checkbox slot="start" dense></forge-checkbox>
            $25 - $50
          </forge-list-item>
          <forge-list-item>
            <forge-checkbox slot="start" dense></forge-checkbox>
            $50 - $100
          </forge-list-item>
          <forge-list-item>
            <forge-checkbox slot="start" dense></forge-checkbox>
            $100 - $200
          </forge-list-item>
          <forge-list-item>
            <forge-checkbox slot="start" dense></forge-checkbox>
            Over $200
          </forge-list-item>
        </forge-list>
      </div>
    </div>

    <forge-toolbar slot="footer" inverted>
      <div slot="end" class="flex gap-small w-full">
        <forge-button type="button" class="flex-1">Clear All</forge-button>
        <forge-button variant="filled" type="button" class="flex-1">Apply</forge-button>
      </div>
    </forge-toolbar>
  </forge-scaffold>
</forge-drawer>
  </body>
</html>
